# =============================================================================
# pgbouncer.ini — Connection pooler para la DB local de Consultor
# Copiar a: /etc/pgbouncer/pgbouncer.ini
#
# IMPORTANTE: La DB externa (10.10.254.252) NO pasa por PgBouncer.
# Conéctala directamente desde config/database.php con DB_EXTERNA_PORT=5432.
# =============================================================================

[databases]
; Solo la base de datos local
consultor_db = host=127.0.0.1 port=5432 dbname=consultor_db

[pgbouncer]
; Escucha solo en localhost — Nginx/Octane conectan desde el mismo servidor
listen_addr = 127.0.0.1
listen_port = 6432

; Autenticación contra userlist.txt
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; transaction = una conexión pooled se libera al terminar la transacción.
; Es el modo más eficiente para apps con muchas conexiones cortas (como Laravel).
; ATENCIÓN: No usar si tu app usa SET SESSION, advisory locks o prepared statements
; con nombres. Octane + Eloquent es compatible con transaction mode.
pool_mode = transaction

; Conexiones que PgBouncer acepta de los clientes (Octane workers)
max_client_conn = 1000

; Conexiones reales que PgBouncer mantiene abiertas hacia PostgreSQL
; Fórmula sugerida: núcleos_cpu × 4, máximo 50 para un servidor pequeño
default_pool_size = 25

; Conexiones de reserva para usuarios admin
reserve_pool_size = 5
reserve_pool_timeout = 3

; Tiempo máximo que un cliente puede esperar por una conexión del pool
server_login_retry = 0.1

; Logs
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid

; Estadísticas (útil para monitoreo con Prometheus)
stats_period = 60

; Tiempo de vida de una conexión idle al servidor PostgreSQL
server_idle_timeout = 600

; Tiempo máximo de una conexión al servidor (evita conexiones colgadas)
server_lifetime = 3600

; Usuario con el que PgBouncer se conecta a PostgreSQL
; Debe coincidir con DB_USERNAME del .env de Laravel
admin_users = consultor_user
stats_users = consultor_user
