# =============================================================================
# consultor.conf — Nginx reverse proxy hacia Laravel Octane (FrankenPHP)
# Copiar a: /etc/nginx/sites-available/consultor.conf
# Activar:  sudo ln -s /etc/nginx/sites-available/consultor.conf \
#                      /etc/nginx/sites-enabled/
#
# Esquema:
#   Cloudflare Tunnel → Nginx :80 → Octane :8000
#   (SSL termina en Cloudflare — Nginx recibe HTTP plano desde el tunnel)
# =============================================================================

# Caché de FastCGI (no aplica aquí, pero útil si algún día usás php-fpm fallback)
# Definir zona de rate limiting para proteger endpoints sensibles
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

upstream octane {
    server 127.0.0.1:8000;
    # keepalive: mantiene conexiones TCP abiertas con Octane
    # Reduce overhead de handshake en cada request
    keepalive 64;
}

server {
    listen 80;
    server_name www.une.edu.py;

    root /var/www/consultor/public;
    index index.php index.html;
    charset utf-8;

    # -------------------------------------------------------------------------
    # Headers de seguridad
    # -------------------------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"              always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-XSS-Protection         "1; mode=block"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Cloudflare Tunnel pasa la IP real del usuario en este header
    # real_ip_header CF-Connecting-IP;
    # set_real_ip_from 127.0.0.1;  # Descomentar cuando Cloudflare Tunnel esté activo

    # -------------------------------------------------------------------------
    # Assets estáticos — servidos por Nginx directamente, sin tocar PHP/Octane
    # -------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot|ico|map)$ {
        root /var/www/consultor/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        try_files $uri =404;
    }

    # Assets compilados por Vite (incluyen hash en el nombre → inmutables)
    location /build/ {
        root /var/www/consultor/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Favicons y robots
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # -------------------------------------------------------------------------
    # Rate limiting en endpoints sensibles
    # -------------------------------------------------------------------------
    location ~ ^/(login|register|password) {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass         http://octane;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://octane;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # -------------------------------------------------------------------------
    # Proxy principal → Octane
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ @octane;
    }

    location @octane {
        proxy_pass         http://octane;
        proxy_http_version 1.1;

        # keepalive con upstream
        proxy_set_header   Connection        "";

        # Headers que Laravel necesita para Request::ip(), Request::secure(), etc.
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;

        # Timeouts generosos para jobs largos o exports
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Buffer para respuestas grandes (exports, reportes)
        proxy_buffering       on;
        proxy_buffer_size     16k;
        proxy_buffers         8 16k;
        proxy_busy_buffers_size 32k;
    }

    # -------------------------------------------------------------------------
    # Bloqueos de seguridad
    # -------------------------------------------------------------------------
    # Denegar acceso a archivos ocultos (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Denegar acceso directo a archivos PHP (excepto index.php — ya manejado por Octane)
    location ~ \.php$ {
        return 404;
    }

    # -------------------------------------------------------------------------
    # Logs
    # -------------------------------------------------------------------------
    access_log /var/log/nginx/consultor_access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/consultor_error.log warn;

    # Ocultar versión de Nginx en errores
    server_tokens off;
}
